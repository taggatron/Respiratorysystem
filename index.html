<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Respiratory System Simulator</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="panel panel--header">
      <h1>Respiratory System Simulator</h1>
      <p>Interactive 3D ventilation model with inhale/exhale animation and physiology controls.</p>
    </header>

    <section class="panel panel--controls" aria-label="Ventilation controls">
      <div class="control-group">
        <label for="rate">Breaths / min</label>
        <input id="rate" type="range" min="6" max="30" value="12" step="1" />
        <output id="rateValue">12</output>
      </div>

      <div class="control-group">
        <label for="tidal">Tidal Volume (L)</label>
        <input id="tidal" type="range" min="0.3" max="1.2" value="0.6" step="0.05" />
        <output id="tidalValue">0.60</output>
      </div>

      <div class="control-group">
        <label for="ratio">Inhale Fraction</label>
        <input id="ratio" type="range" min="0.3" max="0.65" value="0.45" step="0.01" />
        <output id="ratioValue">0.45</output>
      </div>

      <div class="control-group control-group--toggle">
        <label for="play">Animate</label>
        <input id="play" type="checkbox" checked />
      </div>

      <div class="control-group control-group--toggle">
        <label for="showRibs">Show Ribcage</label>
        <input id="showRibs" type="checkbox" checked />
      </div>

      <div class="control-group control-group--toggle">
        <label for="cutaway">Cutaway Mode</label>
        <input id="cutaway" type="checkbox" />
      </div>

      <div class="control-group">
        <label for="cutawayDepth">Cutaway Intensity</label>
        <input id="cutawayDepth" type="range" min="0" max="1" value="0.55" step="0.01" disabled />
        <output id="cutawayValue">0.55</output>
      </div>

      <div class="legend" aria-label="Status panel">
        <div><span class="dot dot--inhale"></span>Inhale</div>
        <div><span class="dot dot--exhale"></span>Exhale</div>
        <div id="phaseText">Phase: Inhale</div>
        <div id="timeText">Cycle Time: 5.00s</div>
      </div>
    </section>

    <main class="panel panel--scene">
      <canvas id="simCanvas" aria-label="3D respiratory simulator"></canvas>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
